services:
  db:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloudpass
    volumes:
      - db:/var/lib/postgres/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud"]
      interval: 5s
      retries: 5

  app:
    image: nextcloud
    ports:
      - 9090:80
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - nextcloud:/var/www/html
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloudpass
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: secret

volumes:
  db:
    name: cloud_posgre
    driver: local
    driver_opts:
      type: none
      device: /tb_storage/nextcloud/postgre_data
      o: bind
  nextcloud:
    name: cloud
    driver: local
    driver_opts:
      type: none
      device: /tb_storage/nextcloud/core
      o: bind
