services:
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /tb_storage/lidarr/config:/config
      - /tb_storage/navidrome/music:/music
      - /tb_storage/qbittorrent/downloads/complete:/downloads
    ports:
      - 8686:8686
    restart: unless-stopped
